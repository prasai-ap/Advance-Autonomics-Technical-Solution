services:
  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: expense_claims
      POSTGRES_USER: expense
      POSTGRES_PASSWORD: local-dev-password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U expense -d expense_claims"]
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    build: .
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+psycopg://expense:local-dev-password@db:5432/expense_claims
      JWT_SECRET_KEY: local-compose-secret-change-before-production
      JWT_ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 15
      LOGIN_MAX_FAILURES: 5
      LOGIN_WINDOW_SECONDS: 60
      DATABASE_STARTUP_RETRIES: 10
      DATABASE_RETRY_DELAY_SECONDS: 2
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data:
